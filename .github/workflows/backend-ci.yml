name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  backend:
    name: Restore, build, and test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore backend/InfraOps.sln

      - name: Build
        run: dotnet build backend/InfraOps.sln --no-restore

      - name: Test
        run: dotnet test backend/InfraOps.sln --no-build --logger trx --results-directory TestResults

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
