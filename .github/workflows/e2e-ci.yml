name: E2E CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'compose.dev.yml'
      - '.github/workflows/e2e-ci.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'compose.dev.yml'
      - '.github/workflows/e2e-ci.yml'

permissions:
  contents: read

jobs:
  e2e:
    name: Docker stack browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start Docker development stack
        run: docker compose -f compose.dev.yml up -d --build

      - name: Wait for API health
        run: |
          for _ in {1..60}; do
            if curl -fsS http://localhost:8080/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f compose.dev.yml logs api
          exit 1

      - name: Wait for frontend
        run: |
          for _ in {1..60}; do
            if curl -fsS http://localhost:5173; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f compose.dev.yml logs frontend
          exit 1

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop Docker development stack
        if: always()
        run: docker compose -f compose.dev.yml down -v
